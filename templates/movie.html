<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Recommender</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='movie.css') }}">
</head>
<body>

<div class="container">

    <h1>🎬 Movie Recommender</h1>

    <div class="form-card">
        <form action="/movie_show" method="POST" class="form-row">

            <select name="movies" size="6" class="movie-select" required>
                {% for title in movies[:200] %}
                    <option value="{{ title }}">{{ title }}</option>
                {% endfor %}
            </select>

            <button type="submit">Recommend</button>

        </form>
    </div>

    {% if rec %}
    <div class="results">
        <h2>Top Picks For You</h2>

        <div class="grid">
            {% for movie in rec %}
                <div class="card">
                    <div class="poster">🎬</div>
                    <p>{{ movie }}</p>
                </div>
            {% endfor %}
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
